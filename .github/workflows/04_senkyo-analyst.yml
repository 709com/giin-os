name: 選挙アナリスト（月曜朝・月次/週次自動判定）
on:
  schedule:
    - cron: "0 22 * * 0"   # 日本時間 月曜朝7時に毎週起動→スクリプト側で実行要否を判定
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install anthropic requests
      - run: python automation/election_analyst.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      - run: |
          git config user.name "giin-os-bot" && git config user.email "bot@local"
          git add reports/ && git commit -m "election report" || true
          git push
